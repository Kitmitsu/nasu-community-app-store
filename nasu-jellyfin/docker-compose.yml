version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: nasu-jellyfin_server_1
      APP_PORT: 8096
    
  server:
    image: ghcr.io/hotio/jellyfin:latest
    environment:
      - TZ=Europe/London
      - PUID=1000
      - PGID=1000
      - UMASK=002
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${UMBREL_ROOT}/network/192.168.1.171/nas/Animu:/data
    restart: unless-stopped
#    user: "1000:1000"
#    init: true
