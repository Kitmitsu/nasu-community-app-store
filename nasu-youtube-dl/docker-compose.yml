version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: nasu-youtube-dl_server_1
      APP_PORT: 8080
    
  server:
    image: jeeaaasustest/youtube-dl:latest
    environment:
      - TZ=Europe/London
      - youtubedl_webui=true
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/youtube-dl_data:/config
      - ${UMBREL_ROOT}/home/Downloads/tube:/downloads
    restart: on-failure
#    user: "1000:1000"
#    init: true
