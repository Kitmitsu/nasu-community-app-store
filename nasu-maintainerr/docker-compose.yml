version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: nasu-maintainerr_server_1
      APP_PORT: 6246
    
  server:
    image: ghcr.io/maintainerr/maintainerr:latest
    volumes:
      - ${APP_DATA_DIR}:/opt/data
    environment:
      - TZ=Europe/London
    user: "1000:1000"
    init: true
    restart: on-failure
