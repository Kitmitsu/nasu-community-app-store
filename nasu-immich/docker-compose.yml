version: '3.7'
x-environment:
  NODE_ENV: production
  DB_HOSTNAME: immich_postgres_1
  DB_USERNAME: immich
  DB_PASSWORD: moneyprintergobrrr
  DB_DATABASE_NAME: immich
  REDIS_HOSTNAME: immich_redis_1
  LOG_LEVEL: log
  JWT_SECRET: ${APP_SEED}
  DISABLE_REVERSE_GEOCODING: 'false'
  REVERSE_GEOCODING_PRECISION: '3'
  PUBLIC_LOGIN_PAGE_MESSAGE: ''
  IMMICH_MACHINE_LEARNING_URL: http://immich_machine-learning_1:3003
services:
  app_proxy:
    environment:
      APP_HOST: nasu-immich_server_1
      APP_PORT: 2283
      PROXY_AUTH_ADD: 'false'
    container_name: nasu-immich_app_proxy_1
    devices:
      - /dev/dri
  server:
    image: >-
      ghcr.io/immich-app/immich-server:v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    volumes:
      - ${UMBREL_ROOT}/home/Photos/immich2/data/upload:/data
    environment:
      NODE_ENV: production
      DB_HOSTNAME: immich_postgres_1
      DB_USERNAME: immich
      DB_PASSWORD: moneyprintergobrrr
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich_redis_1
      LOG_LEVEL: log
      JWT_SECRET: ${APP_SEED}
      DISABLE_REVERSE_GEOCODING: 'false'
      REVERSE_GEOCODING_PRECISION: '3'
      PUBLIC_LOGIN_PAGE_MESSAGE: ''
      IMMICH_MACHINE_LEARNING_URL: http://immich_machine-learning_1:3003
    depends_on:
      - redis
      - postgres
    restart: on-failure
    container_name: immich_server_1
    devices:
      - /dev/dri
  machine-learning:
    image: >-
      ghcr.io/immich-app/immich-machine-learning:v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
    volumes:
      - ${APP_DATA_DIR}/data/model-cache:/cache
    environment:
      NODE_ENV: production
      DB_HOSTNAME: immich_postgres_1
      DB_USERNAME: immich
      DB_PASSWORD: moneyprintergobrrr
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich_redis_1
      LOG_LEVEL: log
      JWT_SECRET: ${APP_SEED}
      DISABLE_REVERSE_GEOCODING: 'false'
      REVERSE_GEOCODING_PRECISION: '3'
      PUBLIC_LOGIN_PAGE_MESSAGE: ''
      IMMICH_MACHINE_LEARNING_URL: http://immich_machine-learning_1:3003
    restart: on-failure
    container_name: immich_machine-learning_1
    devices:
      - /dev/dri
  redis:
    image: >-
      valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    user: '1000:1000'
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    container_name: immich_redis_1
    devices:
      - /dev/dri
  postgres:
    image: >-
      ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:41eacbe83eca995561fe43814fd4891e16e39632806253848efaf04d3c8a8b84
    environment:
      NODE_ENV: production
      DB_HOSTNAME: immich_postgres_1
      DB_USERNAME: immich
      DB_PASSWORD: moneyprintergobrrr
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich_redis_1
      LOG_LEVEL: log
      JWT_SECRET: ${APP_SEED}
      DISABLE_REVERSE_GEOCODING: 'false'
      REVERSE_GEOCODING_PRECISION: '3'
      PUBLIC_LOGIN_PAGE_MESSAGE: ''
      IMMICH_MACHINE_LEARNING_URL: http://immich_machine-learning_1:3003
      POSTGRES_PASSWORD: moneyprintergobrrr
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
    restart: on-failure
    container_name: immich_postgres_1
    devices:
      - /dev/dri
